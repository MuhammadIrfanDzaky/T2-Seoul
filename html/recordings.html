<!DOCTYPE html>
<html lang="en" data-theme="dark" class="rec-page">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team 2 Seoul · FSSE RevoU</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-brand">
        <div class="brand-mark">T2</div>
        <div class="brand-text">
          <span class="brand-name">Team 2</span>
          <span class="brand-sub">FSSE Seoul</span>
        </div>
      </a>

      <ul class="nav-links" id="navLinks">
        <li><a href="../index.html"      class="nav-link" data-i18n="nav.home">Home</a></li>
        <li><a href="about.html"      class="nav-link" data-i18n="nav.about">About</a></li>
        <li><a href="materials.html"  class="nav-link" data-i18n="nav.materi">Materials</a></li>
        <!-- <li><a href="quiz.html"       class="nav-link" data-i18n="nav.game">Quiz</a></li> -->
        <li><a href="recordings.html" class="nav-link nav-rec active" data-i18n="nav.recordings">Recordings</a></li>
      </ul>

      <div class="nav-actions">
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
          <button class="lang-btn"        data-lang="id" onclick="setLang('id')">ID</button>
        </div>
        <button class="theme-btn-nav" onclick="toggleTheme()" title="Switch Theme">
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
          <svg class="icon-sun"  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07-.71.71M6.34 17.66l-.71.71m12.02 0-.71-.71M6.34 6.34l-.71-.71M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z"/></svg>
        </button>
        <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <!-- mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="../index.html"         class="mob-link" onclick="toggleMenu()" data-i18n="nav.home">Home</a>
    <a href="about.html"         class="mob-link" onclick="toggleMenu()" data-i18n="nav.about">About</a>
    <a href="materials.html"     class="mob-link" onclick="toggleMenu()" data-i18n="nav.materi">Materials</a>
    <!-- <a href="quiz.html"          class="mob-link" onclick="toggleMenu()" data-i18n="nav.game">Quiz</a> -->
    <a href="recordings.html"    class="mob-link active" data-i18n="nav.recordings">Recordings</a>
  </div>

  <!-- ═══ PAGE HERO ═══ -->
  <section class="rec-hero">
    <div class="rec-hero-inner">
      <div class="section-label">
        <span class="section-num">REC</span>
        <span class="section-rule"></span>
        <span class="section-tag-txt" data-i18n="rec.tag">Session Archive</span>
      </div>
      <h1 class="section-heading" data-i18n="rec.title">Recordings</h1>
      <p class="section-sub" data-i18n="rec.sub">Replay every session at your own pace.</p>
      <div class="rec-search-row">
        <div class="rec-search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
          <input id="searchDesktop" type="text" placeholder="Search recordings…" oninput="syncSearch(this)"/>
        </div>
        <div class="count-badge"><span id="totalCount">0</span> <span data-i18n="rec.count">recordings</span></div>
      </div>
    </div>
  </section>

  <!-- ═══ GRID ═══ -->
  <section class="rec-grid-section">
    <div class="section-inner">
      <div class="rec-grid" id="cardGrid"></div>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer-main">
    <div class="footer-inner">
      <span data-i18n="footer.text">TL Simulation · Team 2 · FSSE Seoul · © 2026</span>
    </div>
  </footer>

  <!-- ═══ MOBILE BOTTOM NAV ═══ -->
  <nav class="bottom-nav">
    <div class="bn-search">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
      <input id="searchMobile" type="text" placeholder="Search…" oninput="syncSearch(this)"/>
    </div>
    <a href="../index.html" class="bn-home-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
    </a>
    <button class="theme-btn-bn" onclick="toggleTheme()" title="Switch Theme">
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
      <svg class="icon-sun"  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07-.71.71M6.34 17.66l-.71.71m12.02 0-.71-.71M6.34 6.34l-.71-.71M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z"/></svg>
    </button>
  </nav>

  <script src="../js/script.js"></script>
</body>
</html>
